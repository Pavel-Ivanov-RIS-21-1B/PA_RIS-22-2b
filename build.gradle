plugins {
    id 'java'
    id 'application'
    id 'checkstyle'
}

group = 'com.example'
version = '1.0.0'

sourceSets {
    main {
        java {
            srcDir '.'
            include 'App.java'
        }
    }
}

application {
    mainClass = 'App'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
    }
}

checkstyle {
    toolVersion = '10.12.0'
    configFile = file("${rootDir}/checkstyle.xml")
    ignoreFailures = false
}

checkstyleMain {
    source = fileTree('.')
    include 'App.java'
}

jar {
    manifest {
        attributes 'Main-Class': 'App'
    }
    from sourceSets.main.output
}

tasks.named('build') {
    dependsOn checkstyleMain
}
